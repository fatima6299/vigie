services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vigie
      POSTGRES_PASSWORD: vigie
      POSTGRES_DB: vigie
    ports:
      - "5433:5432"
    volumes:
      - vigie-postgres-data:/var/lib/postgresql/data

volumes:
  vigie-postgres-data:
